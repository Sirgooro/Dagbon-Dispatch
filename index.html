<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#C43D00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Dagbon Dispatch" />
  <title>Dagbon Dispatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0900; font-family: 'Outfit', sans-serif; }
    select option { background: #1A1200; color: #FFF8EE; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0F0900; }
    ::-webkit-scrollbar-thumb { background: #3A2800; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const C = {
  primary: "#E8500A", primaryDark: "#C43D00", primaryLight: "#FF6B2B",
  accent: "#FFB020", darkCard: "#2A1F05", text: "#FFF8EE",
  muted: "#B8A88A", success: "#2ECC71", danger: "#E74C3C", bg: "#0F0900",
};
const TOWNS = ["Tamale","Gushegu","Yendi","Savelugu","Damongo","Bimbilla","Walewale","Tolon"];
const ORDERS = [
  { id:"ORD-001", customer:"Abiba Fuseini", from:"Tamale", to:"Gushegu", item:"Groceries (5kg)", status:"delivered", price:35, rider:"Yakubu A.", date:"Apr 7" },
  { id:"ORD-002", customer:"Issifu Mahama", from:"Yendi", to:"Tamale", item:"Electronics", status:"in_transit", price:80, rider:"Alhassan B.", date:"Apr 9" },
  { id:"ORD-003", customer:"Zenabu Seidu", from:"Tamale", to:"Savelugu", item:"Fabric (2 bags)", status:"pending", price:25, rider:null, date:"Apr 9" },
  { id:"ORD-004", customer:"Rashida Zakari", from:"Damongo", to:"Tamale", item:"Fresh vegetables", status:"pending", price:45, rider:null, date:"Apr 9" },
];
const RIDERS = [
  { id:1, name:"Yakubu Alhassan", phone:"0244-xxx-xxx", vehicle:"Motorbike", rating:4.8, deliveries:124, status:"available", earnings:850 },
  { id:2, name:"Alhassan Baba", phone:"0556-xxx-xxx", vehicle:"Tricycle", rating:4.6, deliveries:89, status:"busy", earnings:640 },
  { id:3, name:"Fuseini Dramani", phone:"0200-xxx-xxx", vehicle:"Motorbike", rating:4.9, deliveries:201, status:"available", earnings:1120 },
];
const BUSINESSES = [
  { id:1, name:"Central Market Tamale", owner:"Hajia Mariama", orders:34, revenue:1200, status:"active" },
  { id:2, name:"Gushegu Fresh Produce", owner:"Mr. Kofi Asante", orders:12, revenue:480, status:"active" },
];
const Badge = ({ status }) => {
  const map = {
    pending: { bg:"#3A2800", color:C.accent, label:"Pending" },
    in_transit: { bg:"#0A2A40", color:"#4FC3F7", label:"In Transit" },
    delivered: { bg:"#0A2A0F", color:C.success, label:"Delivered" },
    available: { bg:"#0A2A0F", color:C.success, label:"Available" },
    busy: { bg:"#3A0A0A", color:C.danger, label:"Busy" },
    active: { bg:"#0A2A0F", color:C.success, label:"Active" },
  };
  const s = map[status] || map.pending;
  return <span style={{ background:s.bg, color:s.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700 }}>{s.label}</span>;
};
const Card = ({ children, style: sx={} }) => (
  <div style={{ background:C.darkCard, borderRadius:16, padding:16, marginBottom:12, border:"1px solid #3A2800", ...sx }}>{children}</div>
);
const Btn = ({ children, onClick, variant="primary", style: sx={} }) => {
  const v = {
    primary: { background:`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, color:"#fff" },
    secondary: { background:"#2A1F05", color:C.accent, border:`1px solid ${C.accent}` },
    ghost: { background:"transparent", color:C.muted, border:"1px solid #3A2800" },
    success: { background:"#0A3A15", color:C.success, border:`1px solid ${C.success}` },
  };
  return <button onClick={onClick} style={{ borderRadius:12, padding:"12px 20px", fontWeight:700, fontSize:14, border:"none", cursor:"pointer", fontFamily:"'Outfit',sans-serif", ...v[variant], ...sx }}>{children}</button>;
};
const Inp = ({ label, placeholder, value, onChange, type="text" }) => (
  <div style={{ marginBottom:14 }}>
    {label && <div style={{ fontSize:12, color:C.muted, marginBottom:6, fontWeight:600 }}>{label}</div>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{ width:"100%", background:"#1A1200", border:"1px solid #3A2800", borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, fontFamily:"'Outfit',sans-serif", boxSizing:"border-box", outline:"none" }} />
  </div>
);
const Sel = ({ label, value, onChange, options }) => (
  <div style={{ marginBottom:14 }}>
    {label && <div style={{ fontSize:12, color:C.muted, marginBottom:6, fontWeight:600 }}>{label}</div>}
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{ width:"100%", background:"#1A1200", border:"1px solid #3A2800", borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, fontFamily:"'Outfit',sans-serif", boxSizing:"border-box", outline:"none" }}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Tabs = ({ tabs, active, onSelect }) => (
  <div style={{ display:"flex", borderBottom:"1px solid #3A2800", overflowX:"auto" }}>
    {tabs.map(t=>(
      <button key={t.key} onClick={()=>onSelect(t.key)}
        style={{ flex:"0 0 auto", padding:"12px 14px", background:"none", border:"none", borderBottom:active===t.key?`2px solid ${C.primary}`:"2px solid transparent", color:active===t.key?C.primary:C.muted, fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"'Outfit',sans-serif", whiteSpace:"nowrap" }}>
        {t.label}
      </button>
    ))}
  </div>
);
function CustomerView() {
  const [tab, setTab] = useState("send");
  const [from, setFrom] = useState("Tamale");
  const [to, setTo] = useState("Gushegu");
  const [item, setItem] = useState("");
  const [phone, setPhone] = useState("");
  const [booked, setBooked] = useState(false);
  const price = () => {
    if (from===to) return 0;
    const p = {"Tamale-Gushegu":35,"Tamale-Yendi":50,"Tamale-Savelugu":20,"Yendi-Tamale":50,"Gushegu-Tamale":35};
    return p[`${from}-${to}`]||40;
  };
  if (booked) return (
    <div style={{ padding:20, textAlign:"center" }}>
      <div style={{ fontSize:60, marginBottom:16 }}>✅</div>
      <div style={{ fontSize:22, fontWeight:800, color:C.success, marginBottom:8 }}>Order Placed!</div>
      <div style={{ fontSize:13, color:C.muted, marginBottom:24 }}>A rider will be assigned shortly. You'll receive an SMS confirmation.</div>
      <Card>
        <div style={{ fontSize:12, color:C.muted, marginBottom:4 }}>PAYMENT METHOD</div>
        <div style={{ fontSize:16, fontWeight:700, color:C.accent }}>📱 Mobile Money — GH₵ {price()}</div>
        <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>MTN / Vodafone Cash accepted</div>
      </Card>
      <Btn onClick={()=>setBooked(false)} variant="secondary" style={{ width:"100%" }}>Book Another Delivery</Btn>
    </div>
  );
  return (
    <div>
      <Tabs active={tab} onSelect={setTab} tabs={[{key:"send",label:"📦 Send"},{key:"track",label:"📍 Track"},{key:"history",label:"🕒 History"}]} />
      <div style={{ padding:20 }}>
        {tab==="send" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Book a Delivery</div>
          <Sel label="FROM (Pickup)" value={from} onChange={setFrom} options={TOWNS} />
          <Sel label="TO (Destination)" value={to} onChange={setTo} options={TOWNS} />
          <Inp label="ITEM DESCRIPTION" placeholder="e.g. Groceries, clothes..." value={item} onChange={setItem} />
          <Inp label="YOUR PHONE" placeholder="e.g. 0244-123-456" value={phone} onChange={setPhone} />
          {from!==to && <Card style={{ background:"#1A0D00", border:`1px solid ${C.accent}`, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div><div style={{ fontSize:11, color:C.muted }}>ESTIMATED COST</div><div style={{ fontSize:24, fontWeight:800, color:C.accent }}>GH₵ {price()}</div></div>
              <div style={{ textAlign:"right" }}><div style={{ fontSize:11, color:C.muted }}>PAYMENT</div><div style={{ fontSize:13, fontWeight:700 }}>📱 MoMo</div></div>
            </div>
          </Card>}
          <Btn onClick={()=>item&&phone&&setBooked(true)} style={{ width:"100%" }}>🚀 Confirm Delivery</Btn>
        </>}
        {tab==="track" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Track Orders</div>
          {ORDERS.filter(o=>o.status==="in_transit").map(o=>(
            <Card key={o.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><div style={{ fontWeight:700 }}>{o.id}</div><Badge status={o.status} /></div>
              <div style={{ fontSize:13, color:C.muted, marginBottom:6 }}>{o.from} → {o.to}</div>
              <div style={{ fontSize:13, marginBottom:10 }}>{o.item}</div>
              <div style={{ background:"#1A1200", borderRadius:10, padding:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ fontSize:12, color:C.muted }}>🏍️ Rider</span><span style={{ fontSize:13, fontWeight:700 }}>{o.rider}</span></div>
                <div style={{ marginTop:8, height:6, background:"#2A2000", borderRadius:3 }}><div style={{ height:"100%", width:"60%", background:`linear-gradient(90deg,${C.primary},${C.accent})`, borderRadius:3 }} /></div>
                <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>Estimated: ~45 minutes away</div>
              </div>
            </Card>
          ))}
        </>}
        {tab==="history" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>My Orders</div>
          {ORDERS.map(o=>(
            <Card key={o.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><div style={{ fontWeight:700, fontSize:13 }}>{o.id}</div><Badge status={o.status} /></div>
              <div style={{ fontSize:13, color:C.muted }}>{o.from} → {o.to}</div>
              <div style={{ fontSize:13, margin:"4px 0" }}>{o.item}</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}><span style={{ fontSize:12, color:C.muted }}>{o.date}</span><span style={{ fontSize:14, fontWeight:700, color:C.accent }}>GH₵ {o.price}</span></div>
            </Card>
          ))}
        </>}
      </div>
    </div>
  );
}
function RiderView() {
  const [tab, setTab] = useState("jobs");
  const [accepted, setAccepted] = useState(null);
  const rider = RIDERS[0];
  return (
    <div>
      <Tabs active={tab} onSelect={setTab} tabs={[{key:"jobs",label:"📋 Jobs"},{key:"active",label:"🚦 Active"},{key:"earnings",label:"💰 Earnings"}]} />
      <div style={{ padding:20 }}>
        {tab==="jobs" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>Available Jobs</div>
          <div style={{ fontSize:12, color:C.muted, marginBottom:16 }}>Tap to accept a delivery</div>
          {ORDERS.filter(o=>o.status==="pending").map(o=>(
            <Card key={o.id} style={accepted===o.id?{border:`1px solid ${C.success}`}:{}}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><div style={{ fontWeight:700 }}>{o.from} → {o.to}</div><div style={{ fontSize:16, fontWeight:800, color:C.accent }}>GH₵ {o.price}</div></div>
              <div style={{ fontSize:13, color:C.muted, marginBottom:4 }}>📦 {o.item}</div>
              <div style={{ fontSize:12, color:C.muted, marginBottom:12 }}>👤 {o.customer}</div>
              {accepted===o.id
                ? <div style={{ color:C.success, fontWeight:700, fontSize:13 }}>✅ Accepted — Call customer to confirm pickup</div>
                : <Btn onClick={()=>setAccepted(o.id)} variant="success" style={{ width:"100%" }}>Accept Job</Btn>}
            </Card>
          ))}
        </>}
        {tab==="active" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Active Delivery</div>
          {ORDERS.filter(o=>o.status==="in_transit").map(o=>(
            <Card key={o.id} style={{ border:"1px solid #4FC3F7" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><div style={{ fontWeight:700 }}>{o.id}</div><Badge status="in_transit" /></div>
              <div style={{ fontSize:14, marginBottom:4 }}>📦 {o.item}</div>
              <div style={{ fontSize:13, color:C.muted, marginBottom:12 }}>{o.from} → {o.to}</div>
              <div style={{ display:"flex", gap:10 }}>
                <Btn variant="secondary" style={{ flex:1 }}>📞 Call Customer</Btn>
                <Btn variant="success" style={{ flex:1 }}>✅ Mark Delivered</Btn>
              </div>
            </Card>
          ))}
        </>}
        {tab==="earnings" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>My Earnings</div>
          <Card style={{ background:"linear-gradient(135deg,#2A1500,#1A0D00)", border:`1px solid ${C.accent}` }}>
            <div style={{ fontSize:12, color:C.muted }}>TOTAL EARNED (MTN MoMo)</div>
            <div style={{ fontSize:36, fontWeight:900, color:C.accent, margin:"6px 0" }}>GH₵ {rider.earnings}</div>
            <div style={{ fontSize:12, color:C.muted }}>⭐ {rider.rating} rating · {rider.deliveries} deliveries</div>
          </Card>
          <Card>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>Recent Payments</div>
            {ORDERS.filter(o=>o.status==="delivered").map(o=>(
              <div key={o.id} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #2A1F05" }}>
                <div><div style={{ fontSize:13 }}>{o.from} → {o.to}</div><div style={{ fontSize:11, color:C.muted }}>{o.date}</div></div>
                <div style={{ color:C.success, fontWeight:700 }}>+GH₵ {o.price}</div>
              </div>
            ))}
          </Card>
          <Btn style={{ width:"100%" }}>📱 Withdraw to MoMo</Btn>
        </>}
      </div>
    </div>
  );
}
function BusinessView() {
  const [tab, setTab] = useState("overview");
  const biz = BUSINESSES[0];
  return (
    <div>
      <Tabs active={tab} onSelect={setTab} tabs={[{key:"overview",label:"📊 Overview"},{key:"orders",label:"📦 Orders"},{key:"post",label:"➕ Post"}]} />
      <div style={{ padding:20 }}>
        {tab==="overview" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>{biz.name}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
            {[{label:"Total Orders",val:biz.orders,icon:"📦"},{label:"Revenue",val:`GH₵ ${biz.revenue}`,icon:"💰"},{label:"Active Riders",val:3,icon:"🏍️"},{label:"Avg Delivery",val:"52 min",icon:"⏱️"}].map(s=>(
              <Card key={s.label} style={{ textAlign:"center", padding:14 }}>
                <div style={{ fontSize:24, marginBottom:4 }}>{s.icon}</div>
                <div style={{ fontSize:18, fontWeight:800, color:C.accent }}>{s.val}</div>
                <div style={{ fontSize:11, color:C.muted }}>{s.label}</div>
              </Card>
            ))}
          </div>
          <Card>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:8 }}>Top Destinations</div>
            {[["Gushegu",40],["Yendi",25],["Savelugu",20],["Other",15]].map(([t,p])=>(
              <div key={t} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:12 }}><span>{t}</span><span style={{ color:C.muted }}>{p}%</span></div>
                <div style={{ height:5, background:"#2A1F05", borderRadius:3 }}><div style={{ height:"100%", width:`${p}%`, background:`linear-gradient(90deg,${C.primary},${C.accent})`, borderRadius:3 }} /></div>
              </div>
            ))}
          </Card>
        </>}
        {tab==="orders" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Business Orders</div>
          {ORDERS.map(o=>(
            <Card key={o.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><div style={{ fontWeight:700, fontSize:13 }}>{o.id}</div><Badge status={o.status} /></div>
              <div style={{ fontSize:13, color:C.muted }}>{o.from} → {o.to}</div>
              <div style={{ fontSize:13, margin:"4px 0 8px" }}>{o.item}</div>
              <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ fontSize:12, color:C.muted }}>👤 {o.customer}</span><span style={{ fontSize:14, fontWeight:700, color:C.accent }}>GH₵ {o.price}</span></div>
            </Card>
          ))}
        </>}
        {tab==="post" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Post Delivery Request</div>
          <Inp label="ITEM DESCRIPTION" placeholder="e.g. Rice 10kg, yam tubers..." value="" onChange={()=>{}} />
          <Sel label="PICKUP TOWN" value="Tamale" onChange={()=>{}} options={TOWNS} />
          <Sel label="DESTINATION" value="Gushegu" onChange={()=>{}} options={TOWNS} />
          <Inp label="CONTACT PHONE" placeholder="Customer's phone number" value="" onChange={()=>{}} />
          <Inp label="AGREED PRICE (GH₵)" placeholder="e.g. 45" value="" onChange={()=>{}} type="number" />
          <Btn style={{ width:"100%" }}>📤 Post Delivery Request</Btn>
        </>}
      </div>
    </div>
  );
}
function AdminView() {
  const [tab, setTab] = useState("dashboard");
  return (
    <div>
      <Tabs active={tab} onSelect={setTab} tabs={[{key:"dashboard",label:"📊 Dashboard"},{key:"orders",label:"📦 Orders"},{key:"riders",label:"🏍️ Riders"},{key:"businesses",label:"🏪 Businesses"}]} />
      <div style={{ padding:20 }}>
        {tab==="dashboard" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Platform Overview</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
            {[{label:"Total Orders",val:ORDERS.length,icon:"📦",color:C.accent},{label:"Active Riders",val:2,icon:"🏍️",color:C.success},{label:"Total Revenue",val:"GH₵ 2,890",icon:"💰",color:C.primaryLight},{label:"Businesses",val:BUSINESSES.length,icon:"🏪",color:"#4FC3F7"}].map(s=>(
              <Card key={s.label} style={{ padding:14 }}>
                <div style={{ fontSize:22 }}>{s.icon}</div>
                <div style={{ fontSize:20, fontWeight:800, color:s.color, marginTop:4 }}>{s.val}</div>
                <div style={{ fontSize:11, color:C.muted }}>{s.label}</div>
              </Card>
            ))}
          </div>
          <Card>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>Order Status Summary</div>
            {[{label:"Pending",count:2,color:C.accent},{label:"In Transit",count:1,color:"#4FC3F7"},{label:"Delivered",count:1,color:C.success}].map(s=>(
              <div key={s.label} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #2A1F05" }}>
                <span style={{ fontSize:13 }}>{s.label}</span><span style={{ fontWeight:800, color:s.color }}>{s.count}</span>
              </div>
            ))}
          </Card>
        </>}
        {tab==="orders" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>All Orders</div>
          {ORDERS.map(o=>(
            <Card key={o.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><div style={{ fontWeight:700, fontSize:13 }}>{o.id}</div><Badge status={o.status} /></div>
              <div style={{ fontSize:13 }}>{o.customer}</div>
              <div style={{ fontSize:12, color:C.muted, margin:"4px 0" }}>{o.from} → {o.to} · {o.item}</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
                <span style={{ fontSize:12, color:C.muted }}>🏍️ {o.rider||"Unassigned"}</span>
                <span style={{ fontSize:14, fontWeight:700, color:C.accent }}>GH₵ {o.price}</span>
              </div>
              {o.status==="pending" && <Btn variant="secondary" style={{ width:"100%", marginTop:10 }}>Assign Rider</Btn>}
            </Card>
          ))}
        </>}
        {tab==="riders" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Registered Riders</div>
          {RIDERS.map(r=>(
            <Card key={r.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <div><div style={{ fontWeight:700 }}>{r.name}</div><div style={{ fontSize:12, color:C.muted }}>{r.vehicle} · {r.phone}</div></div>
                <Badge status={r.status} />
              </div>
              <div style={{ display:"flex", gap:16, fontSize:12, color:C.muted }}>
                <span>⭐ {r.rating}</span><span>📦 {r.deliveries}</span><span>💰 GH₵ {r.earnings}</span>
              </div>
              <div style={{ display:"flex", gap:8, marginTop:10 }}>
                <Btn variant="ghost" style={{ flex:1, padding:"8px" }}>📞 Contact</Btn>
                <Btn variant="secondary" style={{ flex:1, padding:"8px" }}>Assign Job</Btn>
              </div>
            </Card>
          ))}
          <Btn variant="secondary" style={{ width:"100%" }}>➕ Add New Rider</Btn>
        </>}
        {tab==="businesses" && <>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:16 }}>Registered Businesses</div>
          {BUSINESSES.map(b=>(
            <Card key={b.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <div><div style={{ fontWeight:700 }}>{b.name}</div><div style={{ fontSize:12, color:C.muted }}>👤 {b.owner}</div></div>
                <Badge status={b.status} />
              </div>
              <div style={{ display:"flex", gap:16, fontSize:12, color:C.muted }}>
                <span>📦 {b.orders} orders</span><span>💰 GH₵ {b.revenue}</span>
              </div>
            </Card>
          ))}
          <Btn variant="secondary" style={{ width:"100%" }}>➕ Register Business</Btn>
        </>}
      </div>
    </div>
  );
}
function App() {
  const [role, setRole] = useState(null);
  const appStyle = { fontFamily:"'Outfit',sans-serif", background:C.bg, minHeight:"100vh", color:C.text, maxWidth:430, margin:"0 auto" };
  if (!role) return (
    <div style={appStyle}>
      <div style={{ background:`linear-gradient(135deg,${C.primaryDark} 0%,#1A0800 100%)`, padding:"32px 20px 24px", textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:8 }}>🚚</div>
        <div style={{ fontSize:30, fontWeight:900, color:"#fff" }}>Dagbon Dispatch</div>
        <div style={{ fontSize:13, color:C.accent, marginTop:6 }}>Fast Delivery Across Northern Region</div>
        <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Tamale · Gushegu · Yendi · Savelugu & more</div>
      </div>
      <div style={{ padding:20 }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:22, fontWeight:800 }}>Who are you?</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>Select your role to continue</div>
        </div>
        {[{role:"Customer",icon:"🛍️",desc:"Send or receive goods across Northern Region"},{role:"Rider",icon:"🏍️",desc:"Pick up & deliver orders, earn money"},{role:"Business",icon:"🏪",desc:"Offer delivery for your market goods"},{role:"Admin",icon:"⚙️",desc:"Manage the entire platform"}].map(r=>(
          <Card key={r.role} style={{ cursor:"pointer" }}>
            <div onClick={()=>setRole(r.role)} style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ fontSize:32, background:"#1A1200", borderRadius:12, width:54, height:54, display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid #3A2800" }}>{r.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:16 }}>{r.role}</div>
                <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{r.desc}</div>
              </div>
              <div style={{ color:C.primary, fontSize:18 }}>›</div>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
  return (
    <div style={appStyle}>
      <div style={{ background:`linear-gradient(135deg,${C.primaryDark} 0%,#1A0800 100%)`, padding:"20px 20px 16px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:10, color:C.accent, fontWeight:700, letterSpacing:2, textTransform:"uppercase" }}>Northern Region</div>
            <div style={{ fontSize:22, fontWeight:800, color:"#fff" }}>🚚 Dagbon Dispatch</div>
          </div>
          <button onClick={()=>setRole(null)} style={{ background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,176,32,0.4)", borderRadius:20, padding:"6px 14px", color:C.accent, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
            {role} ▾
          </button>
        </div>
      </div>
      {role==="Customer" && <CustomerView />}
      {role==="Rider" && <RiderView />}
      {role==="Business" && <BusinessView />}
      {role==="Admin" && <AdminView />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
