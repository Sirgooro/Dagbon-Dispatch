<!DOCTYPE html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#C43D00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Dagbon Dispatch" />
  <title>Dagbon Dispatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0900; font-family: 'Outfit', sans-serif; }
    select option { background: #1A1200; color: #FFF8EE; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0F0900; }
    ::-webkit-scrollbar-thumb { background: #3A2800; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ⚠️ REPLACE THIS WITH YOUR NEW PAYSTACK TEST KEY
const PAYSTACK_KEY = "pk_test_REPLACE_WITH_YOUR_NEW_KEY";

const C = {
  primary: "#E8500A", primaryDark: "#C43D00", primaryLight: "#FF6B2B",
  accent: "#FFB020", darkCard: "#2A1F05", text: "#FFF8EE",
  muted: "#B8A88A", success: "#2ECC71", danger: "#E74C3C", bg: "#0F0900",
};
const TOWNS = ["Tamale","Gushegu","Yendi","Savelugu","Damongo","Bimbilla","Walewale","Tolon"];
const ORDERS = [
  { id:"ORD-001", customer:"Abiba Fuseini", from:"Tamale", to:"Gushegu", item:"Groceries (5kg)", status:"delivered", price:35, rider:"Yakubu A.", date:"Apr 7" },
  { id:"ORD-002", customer:"Issifu Mahama", from:"Yendi", to:"Tamale", item:"Electronics", status:"in_transit", price:80, rider:"Alhassan B.", date:"Apr 9" },
  { id:"ORD-003", customer:"Zenabu Seidu", from:"Tamale", to:"Savelugu", item:"Fabric (2 bags)", status:"pending", price:25, rider:null, date:"Apr 9" },
  { id:"ORD-004", customer:"Rashida Zakari", from:"Damongo", to:"Tamale", item:"Fresh vegetables", status:"pending", price:45, rider:null, date:"Apr 9" },
];
const RIDERS = [
  { id:1, name:"Yakubu Alhassan", phone:"0244-xxx-xxx", vehicle:"Motorbike", rating:4.8, deliveries:124, status:"available", earnings:850 },
  { id:2, name:"Alhassan Baba", phone:"0556-xxx-xxx", vehicle:"Tricycle", rating:4.6, deliveries:89, status:"busy", earnings:640 },
  { id:3, name:"Fuseini Dramani", phone:"0200-xxx-xxx", vehicle:"Motorbike", rating:4.9, deliveries:201, status:"available", earnings:1120 },
];
const BUSINESSES = [
  { id:1, name:"Central Market Tamale", owner:"Hajia Mariama", orders:34, revenue:1200, status:"active" },
  { id:2, name:"Gushegu Fresh Produce", owner:"Mr. Kofi Asante", orders:12, revenue:480, status:"active" },
];

const Badge = ({ status }) => {
  const map = { pending:{bg:"#3A2800",color:C.accent,label:"Pending"}, in_transit:{bg:"#0A2A40",color:"#4FC3F7",label:"In Transit"}, delivered:{bg:"#0A2A0F",color:C.success,label:"Delivered"}, available:{bg:"#0A2A0F",color:C.success,label:"Available"}, busy:{bg:"#3A0A0A",color:C.danger,label:"Busy"}, active:{bg:"#0A2A0F",color:C.success,label:"Active"} };
  const s = map[status]||map.pending;
  return <span style={{background:s.bg,color:s.color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{s.label}</span>;
};
const Card = ({children,style:sx={}}) => <div style={{background:C.darkCard,borderRadius:16,padding:16,marginBottom:12,border:"1px solid #3A2800",...sx}}>{children}</div>;
const Btn = ({children,onClick,variant="primary",style:sx={},disabled=false}) => {
  const v = {
    primary:{background:disabled?"#3A2800":`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`,color:disabled?C.muted:"#fff"},
    secondary:{background:"#2A1F05",color:C.accent,border:`1px solid ${C.accent}`},
    ghost:{background:"transparent",color:C.muted,border:"1px solid #3A2800"},
    success:{background:"#0A3A15",color:C.success,border:`1px solid ${C.success}`},
    danger:{background:"#3A0A0A",color:C.danger,border:`1px solid ${C.danger}`},
  };
  return <button onClick={disabled?null:onClick} style={{borderRadius:12,padding:"12px 20px",fontWeight:700,fontSize:14,border:"none",cursor:disabled?"not-allowed":"pointer",fontFamily:"'Outfit',sans-serif",opacity:disabled?0.6:1,...v[variant],...sx}}>{children}</button>;
};
const Inp = ({label,placeholder,value,onChange,type="text",icon=""}) => (
  <div style={{marginBottom:14}}>
    {label&&<div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600}}>{label}</div>}
    <div style={{position:"relative"}}>
      {icon&&<div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}>{icon}</div>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",background:"#1A1200",border:"1px solid #3A2800",borderRadius:10,padding:icon?"11px 14px 11px 38px":"11px 14px",color:C.text,fontSize:14,fontFamily:"'Outfit',sans-serif",boxSizing:"border-box",outline:"none"}}/>
    </div>
  </div>
);
const Sel = ({label,value,onChange,options}) => (
  <div style={{marginBottom:14}}>
    {label&&<div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600}}>{label}</div>}
    <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:"#1A1200",border:"1px solid #3A2800",borderRadius:10,padding:"11px 14px",color:C.text,fontSize:14,fontFamily:"'Outfit',sans-serif",boxSizing:"border-box",outline:"none"}}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Tabs = ({tabs,active,onSelect}) => (
  <div style={{display:"flex",borderBottom:"1px solid #3A2800",overflowX:"auto"}}>
    {tabs.map(t=>(
      <button key={t.key} onClick={()=>onSelect(t.key)}
        style={{flex:"0 0 auto",padding:"12px 14px",background:"none",border:"none",borderBottom:active===t.key?`2px solid ${C.primary}`:"2px solid transparent",color:active===t.key?C.primary:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Outfit',sans-serif",whiteSpace:"nowrap"}}>
        {t.label}
      </button>
    ))}
  </div>
);

// ── PAYSTACK PAYMENT ──────────────────────────────────────────────────────────
function payWithMoMo({ email, amount, name, phone, onSuccess, onClose }) {
  const handler = PaystackPop.setup({
    key: PAYSTACK_KEY = pk_test_0e2ca2288de1ad47e78846cf8dc39481f8e78913
    email: email || `${phone}@dagbondispatch.com`,
    amount: amount * 100, // Paystack uses pesewas
    currency: "GHS",
    ref: "DD-" + Math.floor(Math.random() * 1000000000),
    metadata: { custom_fields: [{ display_name: "Customer", variable_name: "customer", value: name }, { display_name: "Phone", variable_name: "phone", value: phone }] },
    callback: (response) => onSuccess(response),
    onClose: () => onClose && onClose(),
  });
  handler.openIframe();
}

// ── SPLASH ────────────────────────────────────────────────────────────────────
function SplashScreen({onGetStarted}) {
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.primaryDark} 0%,#1A0800 50%,#0F0900 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:16}}>🚚</div>
      <div style={{fontSize:36,fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:8}}>Dagbon Dispatch</div>
      <div style={{fontSize:14,color:C.accent,marginBottom:4,fontWeight:600}}>Fast Delivery Across Northern Region</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:48}}>Tamale · Gushegu · Yendi · Savelugu & more</div>
      <div style={{width:"100%",maxWidth:360}}>
        <Btn onClick={()=>onGetStarted("signup")} style={{width:"100%",marginBottom:12,padding:"16px",fontSize:16}}>🚀 Get Started — Sign Up</Btn>

  );
}

// ── SIGN UP ───────────────────────────────────────────────────────────────────
function SignUpScreen({onSignUp,onGoLogin}) {
  const [step,setStep] = useState(1);
  const [role,setRole] = useState(null);
  const [name,setName] = useState("");
  const [phone,setPhone] = useState("");
  const [town,setTown] = useState("Tamale");
  const [password,setPassword] = useState("");
  const [confirm,setConfirm] = useState("");
  const [vehicle,setVehicle] = useState("Motorbike");
  const [bizName,setBizName] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  const roles = [{key:"Customer",icon:"🛍️",desc:"Send & receive goods"},{key:"Rider",icon:"🏍️",desc:"Deliver orders & earn"},{key:"Business",icon:"🏪",desc:"Market seller / shop"}];
  const handleSubmit = () => {
    setError("");
    if(!name||!phone||!password){setError("Please fill in all fields");return;}
    if(password!==confirm){setError("Passwords do not match");return;}
    if(phone.length<10){setError("Please enter a valid phone number");return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onSignUp({name,phone,town,role,vehicle,bizName});},1500);
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:`linear-gradient(135deg,${C.primaryDark},#1A0800)`,padding:"24px 20px 20px"}}>
        <div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Northern Region</div>
        <div style={{fontSize:22,fontWeight:800,color:"#fff"}}>🚚 Dagbon Dispatch</div>
        <div style={{fontSize:13,color:C.muted,marginTop:4}}>Create your account</div>
      </div>
      <div style={{display:"flex",gap:6,padding:"16px 20px 0"}}>
        {[1,2,3].map(s=><div key={s} style={{flex:1,height:4,borderRadius:2,background:step>=s?C.primary:"#2A1F05"}}/>)}
      </div>
      <div style={{padding:20}}>
        {step===1&&<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Who are you? 👋</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Choose your role to get started</div>
          {roles.map(r=>(
            <Card key={r.key} style={{cursor:"pointer",border:role===r.key?`2px solid ${C.primary}`:"1px solid #3A2800",marginBottom:12}}>
              <div onClick={()=>setRole(r.key)} style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:32,background:"#1A1200",borderRadius:12,width:54,height:54,display:"flex",alignItems:"center",justifyContent:"center"}}>{r.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:16}}>{r.key}</div><div style={{fontSize:12,color:C.muted}}>{r.desc}</div></div>
                <div style={{width:22,height:22,borderRadius:11,border:`2px solid ${role===r.key?C.primary:"#3A2800"}`,background:role===r.key?C.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {role===r.key&&<div style={{width:8,height:8,borderRadius:4,background:"#fff"}}/>}
                </div>
              </div>
            </Card>
          ))}
          <Btn onClick={()=>role&&setStep(2)} disabled={!role} style={{width:"100%",marginTop:8}}>Continue →</Btn>
          <div style={{textAlign:"center",marginTop:20,fontSize:13,color:C.muted}}>Already have an account?{" "}<span onClick={onGoLogin} style={{color:C.accent,fontWeight:700,cursor:"pointer"}}>Log In</span></div>
        </>}
        {step===2&&<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Your Details 📝</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Tell us about yourself</div>
          <Inp label="FULL NAME" placeholder="e.g. Abiba Fuseini" value={name} onChange={setName} icon="👤"/>
          <Inp label="PHONE NUMBER" placeholder="e.g. 0244-123-456" value={phone} onChange={setPhone} icon="📱" type="tel"/>
          <Sel label="YOUR TOWN" value={town} onChange={setTown} options={TOWNS}/>
          {role==="Rider"&&<Sel label="VEHICLE TYPE" value={vehicle} onChange={setVehicle} options={["Motorbike","Tricycle (Aboboyaa)","Bicycle","Car/Van"]}/>}
          {role==="Business"&&<Inp label="BUSINESS / SHOP NAME" placeholder="e.g. Hajia Mariama Provisions" value={bizName} onChange={setBizName} icon="🏪"/>}
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn onClick={()=>setStep(1)} variant="ghost" style={{flex:1}}>← Back</Btn>
            <Btn onClick={()=>name&&phone&&setStep(3)} disabled={!name||!phone} style={{flex:2}}>Continue →</Btn>
          </div>
        </>}
        {step===3&&<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Set Password 🔒</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Keep your account secure</div>
          <Inp label="CREATE PASSWORD" placeholder="At least 6 characters" value={password} onChange={setPassword} icon="🔒" type="password"/>
          <Inp label="CONFIRM PASSWORD" placeholder="Repeat your password" value={confirm} onChange={setConfirm} icon="✅" type="password"/>
          {error&&<div style={{background:"#3A0A0A",border:`1px solid ${C.danger}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:C.danger}}>⚠️ {error}</div>}
          <Card style={{background:"#1A0D00",border:`1px solid ${C.accent}`,marginBottom:16}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>YOUR ACCOUNT SUMMARY</div>
            <div style={{fontSize:13,marginBottom:4}}>👤 {name}</div>
            <div style={{fontSize:13,marginBottom:4}}>📱 {phone}</div>
            <div style={{fontSize:13,marginBottom:4}}>📍 {town}</div>
            <div style={{fontSize:13}}>{role==="Customer"?"🛍️":role==="Rider"?"🏍️":"🏪"} {role}{role==="Rider"?` · ${vehicle}`:""}{role==="Business"&&bizName?` · ${bizName}`:""}</div>
          </Card>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setStep(2)} variant="ghost" style={{flex:1}}>← Back</Btn>
            <Btn onClick={handleSubmit} disabled={loading||!password||!confirm} style={{flex:2}}>{loading?"Creating account...":"✅ Create Account"}</Btn>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin,onGoSignUp}) {
  const [phone,setPhone] = useState("");
  const [password,setPassword] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  const handleLogin = () => {
    setError("");
    if(!phone||!password){setError("Please enter your phone and password");return;}
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      const role = phone.startsWith("02")?"Customer":phone.startsWith("05")?"Rider":phone.startsWith("03")?"Business":"Customer";
      onLogin({phone,role,name:"Welcome back!",town:"Tamale"});
    },1200);
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:`linear-gradient(135deg,${C.primaryDark},#1A0800)`,padding:"32px 20px 24px",textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:8}}>🚚</div>
        <div style={{fontSize:26,fontWeight:900,color:"#fff"}}>Welcome Back!</div>
        <div style={{fontSize:13,color:C.muted,marginTop:4}}>Log in to Dagbon Dispatch</div>
      </div>
      <div style={{padding:24}}>
        <Inp label="PHONE NUMBER" placeholder="e.g. 0244-123-456" value={phone} onChange={setPhone} icon="📱" type="tel"/>
        <Inp label="PASSWORD" placeholder="Your password" value={password} onChange={setPassword} icon="🔒" type="password"/>
        {error&&<div style={{background:"#3A0A0A",border:`1px solid ${C.danger}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:C.danger}}>⚠️ {error}</div>}
        <Btn onClick={handleLogin} disabled={loading} style={{width:"100%",padding:"16px",fontSize:16,marginBottom:12}}>{loading?"Logging in...":"🔓 Log In"}</Btn>
        <div style={{textAlign:"center",marginBottom:20}}><span style={{fontSize:13,color:C.accent,fontWeight:700,cursor:"pointer"}}>Forgot password?</span></div>
        <div style={{textAlign:"center",padding:"16px 0",borderTop:"1px solid #3A2800"}}>
          <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Don't have an account yet?</div>
          <Btn onClick={onGoSignUp} variant="secondary" style={{width:"100%"}}>➕ Create New Account</Btn>
        </div>
      </div>
    </div>
  );
}

// ── PROFILE TAB ───────────────────────────────────────────────────────────────

        <div style={{fontSize:48,marginBottom:8}}>{user.role==="Customer"?"🛍️":user.role==="Rider"?"🏍️":user.role==="Business"?"🏪":"⚙️"}</div>

// ── CUSTOMER ──────────────────────────────────────────────────────────────────
function CustomerView({user,onLogout}) {
  const [tab,setTab] = useState("send");
  const [from,setFrom] = useState("Tamale");
  const [to,setTo] = useState("Gushegu");
  const [item,setItem] = useState("");
  const [phone,setPhone] = useState(user.phone||"");
  const [booked,setBooked] = useState(false);
  const [paying,setPaying] = useState(false);
  const [paid,setPaid] = useState(false);

  const price = () => {
    if(from===to) return 0;
    const p={"Tamale-Gushegu":35,"Tamale-Yendi":50,"Tamale-Savelugu":20,"Yendi-Tamale":50,"Gushegu-Tamale":35};
    return p[`${from}-${to}`]||40;
  };

  const handlePayment = () => {
    setPaying(true);
    payWithMoMo({
      phone: user.phone||phone,
      name: user.name,
      amount: price(),
      onSuccess: (res) => { setPaying(false); setPaid(true); setBooked(true); },
      onClose: () => setPaying(false),
    });
  };

  if(booked&&paid) return (
    <div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:16}}>✅</div>
      <div style={{fontSize:22,fontWeight:800,color:C.success,marginBottom:8}}>Order Placed & Paid!</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Payment confirmed via Mobile Money. A rider will be assigned shortly!</div>
      <Card style={{background:"#0A2A0F",border:`1px solid ${C.success}`}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:4}}>PAYMENT CONFIRMED</div>
        <div style={{fontSize:18,fontWeight:700,color:C.success}}>✅ GH₵ {price()} — MoMo</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>{from} → {to}</div>
      </Card>
      <Btn onClick={()=>{setBooked(false);setPaid(false);setItem("");}} variant="secondary" style={{width:"100%"}}>Book Another Delivery</Btn>
    </div>
  );

  return (
    <div>
      <Tabs active={tab} onSelect={setTab} tabs={[{key:"send",label:"📦 Send"},{key:"track",label:"📍 Track"},{key:"history",label:"🕒 History"},{key:"profile",label:"👤 Me"}]}/>
      <div style={{padding:20}}>
        {tab==="send"&&<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>Book a Delivery</div>
          <Sel label="FROM (Pickup)" value={from} onChange={setFrom} options={TOWNS}/>
          <Sel label="TO (Destination)" value={to} onChange={setTo} options={TOWNS}/>
          <Inp label="ITEM DESCRIPTION" placeholder="e.g. Groceries, clothes..." value={item} onChange={setItem}/>
          <Inp label="YOUR PHONE" placeholder="e.g. 0244-123-456" value={phone} onChange={setPhone}/>
          {from!==to&&<>
            <Card style={{background:"#1A0D00",border:`1px solid ${C.accent}`,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:11,color:C.muted}}>ESTIMATED COST</div><div style={{fontSize:24,fontWeight:800,color:C.accent}}>GH₵ {price()}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:C.muted}}>PAYMENT</div><div style={{fontSize:13,fontWeight:700}}>📱 MoMo</div></div>
              </div>
            </Card>
            <Btn onClick={()=>item&&phone&&handlePayment()} disabled={!item||!phone||paying} style={{width:"100%"}}>
              {paying?"Opening payment...":"📱 Pay with MoMo — GH₵ "+price()}
            </Btn>
          </>}
        </>}
        {tab==="track"&&<>
          <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>Track Orders</div>
          {ORDERS.filter(o=>o.status==="in_transit").map(o=>(
            <Card key={o.id}>

              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{fontWeight:700}}>{o.id}</div><Badge status="in_transit"/></div>
              <div style={{fontSize:14,marginBottom:4}}>📦 {o.item}</div>

          <Card style={{background:"linear-gradient(135deg,#2A1500,#1A0D00)",border:`1px solid ${C.accent}`}}>

// ── MAIN ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen] = useState("splash");
  const [user,setUser] = useState(null);
  const appStyle = {fontFamily:"'Outfit',sans-serif",background:C.bg,minHeight:"100vh",color:C.text,maxWidth:430,margin:"0 auto"};
  if(screen==="splash") return <div style={appStyle}><SplashScreen onGetStarted={setScreen}/></div>;
  if(screen==="signup") return <div style={appStyle}><SignUpScreen onSignUp={u=>{setUser(u);setScreen("app");}} onGoLogin={()=>setScreen("login")}/></div>;
  if(screen==="login") return <div style={appStyle}><LoginScreen onLogin={u=>{setUser(u);setScreen("app");}} onGoSignUp={()=>setScreen("signup")}/></div>;
  return (
    <div style={appStyle}>
      <div style={{background:`linear-gradient(135deg,${C.primaryDark} 0%,#1A0800 100%)`,padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Northern Region</div>
            <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>🚚 Dagbon Dispatch</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700}}>{user.name}</div>
            <div style={{fontSize:10,color:C.muted}}>{user.role}</div>
          </div>
        </div>
      </div>
      {user.role==="Customer"&&<CustomerView user={user} onLogout={()=>{setUser(null);setScreen("splash");}}/>}
      {user.role==="Rider"&&<RiderView user={user} onLogout={()=>{setUser(null);setScreen("splash");}}/>}
      {user.role==="Business"&&<BusinessView user={user} onLogout={()=>{setUser(null);setScreen("splash");}}/>}
      {user.role==="Admin"&&<AdminView user={user} onLogout={()=>{setUser(null);setScreen("splash");}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
